<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lingo Mate - 語学学習のおとも</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>🗣️ Lingo Mate</h1>
    <p class="tagline">語学学習のおとも - フラッシュカード &amp; クイズ</p>
  </header>

  <nav class="tabs" aria-label="モード切り替え">
    <button class="tab-button is-active" data-mode="flashcards" type="button">フラッシュカード</button>
    <button class="tab-button" data-mode="quiz" type="button">クイズ</button>
  </nav>

  <main>
    <!-- Flashcard mode -->
    <section id="flashcards" class="mode is-active" aria-labelledby="flashcards-title">
      <h2 id="flashcards-title" class="visually-hidden">フラッシュカード</h2>

      <div class="card" id="flashcard" role="button" tabindex="0"
           aria-label="カードをめくる">
        <div class="card-inner" id="card-inner">
          <div class="card-face card-front">
            <span class="card-lang">単語</span>
            <p class="card-text" id="card-front-text">-</p>
          </div>
          <div class="card-face card-back">
            <span class="card-lang">意味</span>
            <p class="card-text" id="card-back-text">-</p>
            <p class="card-example" id="card-example"></p>
          </div>
        </div>
      </div>

      <p class="card-hint">カードをクリック（またはスペースキー）でめくる</p>

      <div class="controls">
        <button id="prev-card" type="button" class="btn">← 前へ</button>
        <span class="counter" id="card-counter">0 / 0</span>
        <button id="next-card" type="button" class="btn">次へ →</button>
      </div>
      <div class="controls">
        <button id="shuffle-cards" type="button" class="btn btn-secondary">🔀 シャッフル</button>
      </div>
    </section>

    <!-- Quiz mode -->
    <section id="quiz" class="mode" aria-labelledby="quiz-title">
      <h2 id="quiz-title" class="visually-hidden">クイズ</h2>

      <div id="quiz-active" class="quiz-active">
        <p class="quiz-progress" id="quiz-progress">問題 0 / 0</p>
        <p class="quiz-question" id="quiz-question">-</p>
        <div class="quiz-options" id="quiz-options"></div>
        <p class="quiz-feedback" id="quiz-feedback" role="status" aria-live="polite"></p>
        <button id="quiz-next" type="button" class="btn" hidden>次の問題 →</button>
      </div>

      <div id="quiz-result" class="quiz-result" hidden>
        <h3>結果</h3>
        <p class="quiz-score" id="quiz-score">-</p>
        <button id="quiz-restart" type="button" class="btn">もう一度</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>ビルド不要 - HTML / CSS / JavaScript だけで動きます</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
